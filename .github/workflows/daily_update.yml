name: TEFAS Gunluk Guncelleme

on:
  schedule:
    # Türkiye saati (UTC+3, sabit) -> UTC karşılıkları:
    - cron: "0 6 * * 1-5"    # 09:00 TR
    - cron: "0 7 * * 1-5"    # 10:00 TR
    - cron: "30 9 * * 1-5"   # 12:30 TR
    - cron: "30 13 * * 1-5"  # 16:30 TR
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari kur
        run: pip install -r requirements.txt

      - name: Veriyi guncelle
        run: python scripts/update_data.py

      - name: Puanlama sistemini calistir
        run: python scripts/score_funds.py

      - name: Degisiklikleri kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tefas_gecmis_veri.parquet docs/
          git diff --quiet --cached || git commit -m "Otomatik guncelleme"
          git push
